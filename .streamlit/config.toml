# Streamlit Configuration
[server]
port = 8501
headless = true
runOnSave = true

[client]
showErrorDetails = true
toolbarMode = "developer"

[logger]
level = "info"

[theme]
base = "light"
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"
